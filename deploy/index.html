<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="vsl-player.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="faq-sections.jsx"></script>
<script type="text/babel" src="apply.jsx"></script>
<script type="text/babel">
const { createRoot } = ReactDOM;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroLayout": "Video-first",
  "offerLayout": "Timeline",
  "ctaStyle": "Coral",
  "videoMode": "YouTube video",
  "captions": true,
  "urgencyBar": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useReveal();

  const heroLayout = t.heroLayout === 'Split' ? 'split' : 'video';
  const offerLayout = t.offerLayout === 'Cards' ? 'cards' : 'timeline';
  const ctaStyle = t.ctaStyle === 'Gradient' ? 'gradient' : 'coral';
  const videoMode = t.videoMode === 'Upload real video' ? 'upload' : (t.videoMode === 'Animated VSL' ? 'animated' : 'youtube');

  return (
    <React.Fragment>
      <Nav />
      <Hero heroLayout={heroLayout} videoMode={videoMode} captionsDefault={t.captions} ctaStyle={ctaStyle} />
      <Marquee />
      <OfferSection layout={offerLayout} />
      <WhoForSection />
      <Comparison />
      <Founder />
      <Testimonials />
      <SupercutSection />
      <WhatHappensSection />
      <ApplySection ctaStyle={ctaStyle} />
      <BookSection />
      <ConsultingFallback />
      <FAQSection />
      <Footer />
      <UrgencyBar show={t.urgencyBar} />

      <TweaksPanel>
        <TweakSection label="Layout" />
        <TweakRadio label="Hero" value={t.heroLayout} options={['Video-first', 'Split']} onChange={(v) => setTweak('heroLayout', v)} />
        <TweakRadio label="Offer" value={t.offerLayout} options={['Timeline', 'Cards']} onChange={(v) => setTweak('offerLayout', v)} />
        <TweakSection label="Style" />
        <TweakRadio label="CTA color" value={t.ctaStyle} options={['Coral', 'Gradient']} onChange={(v) => setTweak('ctaStyle', v)} />
        <TweakToggle label="Spots-limited bar" value={t.urgencyBar} onChange={(v) => setTweak('urgencyBar', v)} />
        <TweakSection label="Video" />
        <TweakRadio label="Source" value={t.videoMode} options={['YouTube video', 'Animated VSL', 'Upload real video']} onChange={(v) => setTweak('videoMode', v)} />
        <TweakToggle label="Captions on by default" value={t.captions} onChange={(v) => setTweak('captions', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}
createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
